name: Build & Deploy Anchor Program

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        default: 'devnet'
        type: choice
        options:
          - devnet
          - mainnet-beta

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust 1.79
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.79.0"

      - name: Install, Build & Deploy
        env:
          DEPLOYER_KEYPAIR: ${{ secrets.DEPLOYER_KEYPAIR }}
          NETWORK: ${{ inputs.network }}
        run: |
          set -euo pipefail

          # ── Install Agave / Solana CLI ──────────────────────────────────────
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.0.15/install)"
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version

          # ── Write deployer key ──────────────────────────────────────────────
          echo "$DEPLOYER_KEYPAIR" > /tmp/deployer.json
          solana config set --keypair /tmp/deployer.json
          solana config set --url "$NETWORK"
          echo "Deployer: $(solana address)"
          echo "Balance : $(solana balance)"

          # ── Build ───────────────────────────────────────────────────────────
          cargo build-sbf

          # ── Deploy ──────────────────────────────────────────────────────────
          solana program deploy target/deploy/moonflux_curve.so \
            --keypair /tmp/deployer.json \
            --url "$NETWORK" | tee /tmp/deploy.txt

          cat /tmp/deploy.txt
          PROGRAM_ID=$(grep -oP "Program Id: \K\S+" /tmp/deploy.txt || echo "see above")
          echo "✅ Program ID: $PROGRAM_ID"

          echo "### ✅ Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "Network: $NETWORK" >> $GITHUB_STEP_SUMMARY
          echo "Program ID: \`$PROGRAM_ID\`" >> $GITHUB_STEP_SUMMARY
