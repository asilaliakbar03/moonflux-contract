name: Build & Deploy Anchor Program

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network'
        required: true
        default: 'devnet'
        type: choice
        options:
          - devnet
          - mainnet-beta

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust, Agave, Build & Deploy
        env:
          DEPLOYER_KEYPAIR:  ${{ secrets.DEPLOYER_KEYPAIR }}
          PROGRAM_KEYPAIR:   ${{ secrets.PROGRAM_KEYPAIR }}
          NETWORK: ${{ inputs.network }}
        run: |
          set -euxo pipefail

          # ── 1. Install Rust via rustup ───────────────────────────────────────
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

          # ── 2. Install Agave stable ──────────────────────────────────────────
          curl -sSfL https://release.anza.xyz/stable/install | sh
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version

          # ── 3. Configure deployer wallet ─────────────────────────────────────
          echo "$DEPLOYER_KEYPAIR" > /tmp/deployer.json
          solana config set --keypair /tmp/deployer.json
          solana config set --url "$NETWORK"
          echo "Deployer: $(solana address)"
          echo "Balance : $(solana balance)"

          # ── 4. Restore program keypair (fixed address every deploy) ──────────
          mkdir -p target/deploy
          echo "$PROGRAM_KEYPAIR" > target/deploy/moonflux_curve-keypair.json

          # ── 5. Build ─────────────────────────────────────────────────────────
          cargo build-sbf

          # ── 6. Deploy (upgrade existing program or create at fixed address) ──
          solana program deploy target/deploy/moonflux_curve.so \
            --keypair /tmp/deployer.json \
            --program-id target/deploy/moonflux_curve-keypair.json \
            --url "$NETWORK" | tee /tmp/deploy.txt

          cat /tmp/deploy.txt
          PROGRAM_ID=$(grep -oP "Program Id: \K\S+" /tmp/deploy.txt || echo "check_logs")
          echo ""
          echo "========================================"
          echo "  ✅  PROGRAM ID: $PROGRAM_ID"
          echo "========================================"

          echo "### ✅ Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "**Network:** $NETWORK" >> "$GITHUB_STEP_SUMMARY"
          echo "**Program ID:** \`$PROGRAM_ID\`" >> "$GITHUB_STEP_SUMMARY"
