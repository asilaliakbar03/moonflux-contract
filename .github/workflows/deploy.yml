name: Build & Deploy Anchor Program

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        default: 'devnet'
        type: choice
        options:
          - devnet
          - mainnet-beta

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust 1.75.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75.0"
          components: rustfmt, clippy

      - name: Install Solana CLI 1.18.26
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Write deployer keypair
        run: |
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          echo '${{ secrets.DEPLOYER_KEYPAIR }}' > /tmp/deployer.json
          solana config set --keypair /tmp/deployer.json
          solana config set --url ${{ inputs.network }}
          echo "Deployer address: $(solana address)"
          echo "Balance: $(solana balance)"

      - name: Build Anchor program
        run: |
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          rm -f Cargo.lock
          cargo build-sbf 2>&1

      - name: Deploy to chosen network
        run: |
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          PROGRAM_SO="target/deploy/moonflux_curve.so"
          echo "Deploying $PROGRAM_SO to ${{ inputs.network }}..."
          solana program deploy "$PROGRAM_SO" \
            --keypair /tmp/deployer.json \
            --url ${{ inputs.network }} \
            --output json > /tmp/deploy_output.json
          PROGRAM_ID=$(cat /tmp/deploy_output.json | jq -r .programId)
          echo "✅ DEPLOYED PROGRAM ID: $PROGRAM_ID"
          echo "program_id=$PROGRAM_ID" >> $GITHUB_OUTPUT
          
          echo "### ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Network:** ${{ inputs.network }}" >> $GITHUB_STEP_SUMMARY
          echo "**Program ID:** \`$PROGRAM_ID\`" >> $GITHUB_STEP_SUMMARY
